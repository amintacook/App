name: Build and Publish Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# ۳. سطح دسترسی: برای ایجاد یک Release (انتشار)، نیاز به دسترسی write برای contents داریم
permissions:
  contents: write
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # بهینه‌سازی: کش کردن گریدل برای افزایش سرعت بیلد در دفعات بعدی
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug

      # آپلود فایل در تب اکشن‌ها (به عنوان بک‌آپ موقت)
      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # استفاده از * برای جلوگیری از خطای پیدا نشدن نام دقیق فایل
          path: app/build/outputs/apk/debug/*.apk 

      # ساخت تگ داینامیک بر اساس تاریخ و زمان برای انتشار
      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=v1.0.$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      # انتشار رسمی در صفحه Releases گیت‌هاب
      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: "Debug Build ${{ env.release_tag }}"
          files: app/build/outputs/apk/debug/*.apk
          
