name: Build and Release APK with Consistent Signature

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create a fixed debug keystore (امضای ثابت)
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: apk

      - name: Get current date for release tag
        id: date
        run: echo "TAG=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.TAG }}
          name: "نسخه خودکار - ${{ steps.date.outputs.TAG }}"
          body: |
            فایل APK دموی اپلیکیشن برای گوشی A50.

            ## نحوه نصب
            1. فایل را دانلود کنید
            2. به گوشی A50 انتقال دهید
            3. در تنظیمات گوشی، نصب از منابع ناشناس را فعال کنید
            4. روی فایل ضربه بزنید و نصب کنید

            این نسخه به صورت خودکار توسط GitHub Actions ساخته شده است.
          files: apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
