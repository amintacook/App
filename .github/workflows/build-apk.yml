name: Build and Release APK (Samsung A50 Compatible)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          sdkmanager --licenses <<< "y" || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # в”Җв”Җв”Җ ЩҫЪҶ Ъ©ШұШҜЩҶ build.gradle ШЁШұШ§ЫҢ ШіШ§ШІЪҜШ§ШұЫҢ ШЁШ§ A50 в”Җв”Җв”Җ
      - name: Patch build.gradle for Samsung A50 compatibility
        run: |
          # ЩҫЫҢШҜШ§ Ъ©ШұШҜЩҶ ЩҒШ§ЫҢЩ„ build.gradle Ш§Щҫ
          GRADLE_FILE="app/build.gradle"
          if [ ! -f "$GRADLE_FILE" ]; then
            GRADLE_FILE=$(find . -name "build.gradle" -path "*/app/*" | head -1)
          fi
          echo "Found gradle file: $GRADLE_FILE"

          # ЩҫЪҶ minSdk ШЁЩҮ 23 (Android 6) ШЁШұШ§ЫҢ ЩҫЩҲШҙШҙ ШЁЫҢШҙШӘШұ
          if grep -q "minSdkVersion\|minSdk" "$GRADLE_FILE"; then
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 23/g' "$GRADLE_FILE"
            sed -i 's/minSdk = [0-9]*/minSdk = 23/g' "$GRADLE_FILE"
            echo "вң… minSdk patched to 23"
          fi

          # ЩҫЪҶ targetSdk ШЁЩҮ 34
          if grep -q "targetSdkVersion\|targetSdk" "$GRADLE_FILE"; then
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' "$GRADLE_FILE"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 34/g' "$GRADLE_FILE"
            echo "вң… targetSdk patched to 34"
          fi

          # Ш§Ш·Щ…ЫҢЩҶШ§ЩҶ Ш§ШІ ЩҲШ¬ЩҲШҜ ABI splits ШЁШұШ§ЫҢ ARM
          if ! grep -q "abiFilters\|splits" "$GRADLE_FILE"; then
            sed -i '/defaultConfig {/a\        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' "$GRADLE_FILE"
            echo "вң… ABI filters added"
          fi

          echo "=== Final build.gradle content ==="
          cat "$GRADLE_FILE"

      # в”Җв”Җв”Җ ШіШ§Ш®ШӘ Keystore ШЁШұШ§ЫҢ Release signing в”Җв”Җв”Җ
      - name: Generate Release Keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias releasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=SamsungA50App, OU=Mobile, O=MyApp, L=Tehran, S=Tehran, C=IR" \
            -storepass "MyStorePass123!" \
            -keypass "MyKeyPass123!"
          echo "вң… Release keystore generated"

      # в”Җв”Җв”Җ ШіШ§Ш®ШӘ APK ШЁШ§ Ш§Щ…Ш¶Ш§ЫҢ Release в”Җв”Җв”Җ
      - name: Build Release APK (signed)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="MyStorePass123!" \
            -Pandroid.injected.signing.key.alias=releasekey \
            -Pandroid.injected.signing.key.password="MyKeyPass123!" \
            --stacktrace
        env:
          ANDROID_BUILD_TOOLS_VERSION: "34.0.0"

      # в”Җв”Җв”Җ zipalign ЩҲ verify в”Җв”Җв”Җ
      - name: Zipalign and verify APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "Using build tools: $BUILD_TOOLS_DIR"

          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unaligned*" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          echo "Found APK: $APK_PATH"

          # zipalign
          $BUILD_TOOLS_DIR/zipalign -v -p 4 "$APK_PATH" app-final.apk
          
          # verify alignment
          $BUILD_TOOLS_DIR/zipalign -c -v 4 app-final.apk && echo "вң… APK is aligned" || echo "вҡ пёҸ Alignment check failed"

          # verify signature
          $BUILD_TOOLS_DIR/apksigner verify --verbose app-final.apk 2>/dev/null && echo "вң… APK signature valid" || echo "вҡ пёҸ Signature check"

      - name: Get APK info
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "=== APK Details ==="
          ls -lh app-final.apk
          $BUILD_TOOLS_DIR/aapt dump badging app-final.apk | grep -E "package|sdkVersion|targetSdkVersion|native-code" || true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-a50-compatible-apk
          path: app-final.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: samsung-a50-compatible-apk
          path: apk

      - name: Rename APK
        run: |
          cd apk
          ls -la
          # ЩҶШ§Щ…вҖҢЪҜШ°Ш§ШұЫҢ ЩҲШ§Ш¶Шӯ ШЁШұШ§ЫҢ APK
          mv *.apk samsung-a50-app.apk 2>/dev/null || true
          ls -la

      - name: Get current date for release tag
        id: date
        run: echo "TAG=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.TAG }}
          name: "вң… APK ШіШ§ШІЪҜШ§Шұ ШЁШ§ Samsung A50 - ${{ steps.date.outputs.TAG }}"
          body: |
            ## рҹ“ұ APK ШЁЩҮЫҢЩҶЩҮвҖҢШіШ§ШІЫҢвҖҢШҙШҜЩҮ ШЁШұШ§ЫҢ Samsung Galaxy A50
            
            ### Щ…ШҙШ®ШөШ§ШӘ ЩҒЩҶЫҢ:
            - **ШӯШҜШ§ЩӮЩ„ Ш§ЩҶШҜШұЩҲЫҢШҜ:** 6.0 (API 23)
            - **ЩҮШҜЩҒ Ш§ЩҶШҜШұЩҲЫҢШҜ:** 14 (API 34)
            - **Щ…Ш№Щ…Ш§ШұЫҢ ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ:** arm64-v8a, armeabi-v7a, x86_64
            - **Ш§Щ…Ш¶Ш§:** Release (ЩҶЩҮ Debug)
            - **Zipalign:** вң… Ш§ЩҶШ¬Ш§Щ… ШҙШҜЩҮ
            
            ### ШұШ§ЩҮЩҶЩ…Ш§ЫҢ ЩҶШөШЁ ШұЩҲЫҢ Samsung A50:
            1. Ш§ЪҜШұ ЩҶШіШ®ЩҮ ЩӮШЁЩ„ЫҢ ЩҶШөШЁ Ш§ШіШӘ вҶ’ **Ш§ШЁШӘШҜШ§ ШӯШ°ЩҒ Ъ©ЩҶЫҢШҜ**
            2. ШЁШұЩҲ ШЁЩҮ **ШӘЩҶШёЫҢЩ…Ш§ШӘ вҶҗ ШЁЫҢЩҲЩ…ШӘШұЫҢЪ© ЩҲ Ш§Щ…ЩҶЫҢШӘ вҶҗ ЩҶШөШЁ ШЁШұЩҶШ§Щ…ЩҮвҖҢЩҮШ§ЫҢ ЩҶШ§ШҙЩҶШ§Ші**
            3. ШЁШұЩҶШ§Щ…ЩҮ Щ…ШұЩҲШұЪҜШұ ЫҢШ§ ЩҒШ§ЫҢЩ„вҖҢЩ…ЩҶЫҢШ¬Шұ Ш®ЩҲШҜ ШұШ§ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ШұШҜЩҮ ЩҲ **Ш§Ш¬Ш§ШІЩҮ ШҜЩҮЫҢШҜ**
            4. ЩҒШ§ЫҢЩ„ `samsung-a50-app.apk` ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜ
            5. Ш§ШІ ЩҒШ§ЫҢЩ„вҖҢЩ…ЩҶЫҢШ¬Шұ ШұЩҲЫҢ APK Ш¶ШұШЁЩҮ ШЁШІЩҶЫҢШҜ ЩҲ ЩҶШөШЁ Ъ©ЩҶЫҢШҜ
            
            ### Ш§ЪҜШұ Ш®Ш·Ш§ЫҢ В«ЩҶШөШЁ ЩҶШҙШҜВ» ШҜЫҢШҜЫҢШҜ:
            - вң… ЩҶШіШ®ЩҮ ЩӮШЁЩ„ЫҢ ШұШ§ ШӯШ°ЩҒ Ъ©ЩҶЫҢШҜ
            - вң… ЪҜЩҲШҙЫҢ ШұШ§ ШұЫҢвҖҢШ§ШіШӘШ§ШұШӘ Ъ©ЩҶЫҢШҜ ЩҲ ШҜЩҲШЁШ§ШұЩҮ ЩҶШөШЁ Ъ©ЩҶЫҢШҜ
            - вң… Ш§ШІ Samsung My Files ШЁШұШ§ЫҢ ЩҶШөШЁ Ш§ШіШӘЩҒШ§ШҜЩҮ Ъ©ЩҶЫҢШҜ
          files: apk/samsung-a50-app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
