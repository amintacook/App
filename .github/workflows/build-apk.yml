name: Build and Release APK (No Secret Required)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create debug keystore (با رمز استاندارد)
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" \
            -storepass android -keypass android

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: apk

      - name: Get current date for release tag
        id: date
        run: echo "TAG=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.TAG }}
          name: "APK قابل نصب - ${{ steps.date.outputs.TAG }}"
          body: |
            ## فایل APK مخصوص گوشی‌های اندروید
            
            **نکات نصب:**
            1. اگر نسخه قبلی از این برنامه را نصب دارید، **اول آن را حذف کنید** (به علت تغییر امضا).
            2. در گوشی خود به **تنظیمات → امنیت** رفته و **نصب از منابع ناشناس** را برای مرورگر یا فایل منیجری که استفاده می‌کنید فعال کنید.
            3. فایل APK را دانلود کرده و روی آن ضربه بزنید.
            
            - این APK روی **همه گوشی‌های اندروید 6 به بالا (API 23+)** نصب می‌شود.
            - در صورت بروز خطای «نصب نشد»، لطفاً ابتدا نسخه قبلی را حذف و مجدد تلاش کنید.
          files: apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
