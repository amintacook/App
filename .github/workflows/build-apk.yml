name: Build and Release APK (Samsung A50)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      # ─── نسخه صحیح Gradle برای AGP 9.1.1 ───
      - name: Install Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Generate gradlew wrapper
        run: |
          gradle wrapper --gradle-version=9.3.1
          chmod +x gradlew
          echo "✅ gradlew 9.3.1 created"

      - name: Disable configuration cache
        run: |
          sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/' gradle.properties
          echo "✅ Configuration cache disabled"

      - name: Generate Release Keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias releasekey \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -dname "CN=MyApp, OU=Dev, O=MyOrg, L=Tehran, ST=Tehran, C=IR" \
            -storepass "MyStorePass123!" \
            -keypass "MyStorePass123!"
          echo "✅ Keystore generated"

      - name: Patch app/build.gradle.kts
        run: |
          # حذف signingConfig که مانع نصب روی A50 می‌شود
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts || true
          # اطمینان از minSdk 23
          sed -i 's/minSdk = [0-9]*/minSdk = 23/' app/build.gradle.kts || true
          echo "=== app/build.gradle.kts ==="
          cat app/build.gradle.kts

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="MyStorePass123!" \
            -Pandroid.injected.signing.key.alias=releasekey \
            -Pandroid.injected.signing.key.password="MyStorePass123!" \
            -PGEMINI_API_KEY="placeholder_key" \
            --no-configuration-cache \
            --stacktrace
        env:
          GEMINI_API_KEY: "placeholder_key"

      - name: Zipalign APK
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          $BUILD_TOOLS/zipalign -v -p 4 "$APK" app-final.apk
          ls -lh app-final.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsung-a50-apk
          path: app-final.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: samsung-a50-apk
          path: apk

      - name: Get tag
        id: date
        run: echo "TAG=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.TAG }}
          name: "✅ APK Samsung A50 - ${{ steps.date.outputs.TAG }}"
          body: |
            ## 📱 APK آماده نصب روی Samsung Galaxy A50

            | ویژگی | مقدار |
            |-------|-------|
            | حداقل Android | 6.0 (API 23) |
            | امضا | Release ✅ |
            | Zipalign | ✅ |

            ### راهنمای نصب:
            1. نسخه قبلی را **حذف** کنید
            2. **تنظیمات ← بیومتریک و امنیت ← نصب برنامه‌های ناشناس** → فعال کنید
            3. APK را دانلود و نصب کنید
          files: apk/app-final.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
